{% extends 'base.html' %}

{% block content %}

<style>

/* =========================
   PAGE
========================= */

.success-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    overflow:hidden;
    position:relative;

    background:
    linear-gradient(
        135deg,
        #0f172a 0%,
        #1e293b 50%,
        #334155 100%
    );
}

/* =========================
   CARD
========================= */

.success-card{

    width:100%;
    max-width:620px;

    background:
    rgba(255,255,255,0.12);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:30px;

    padding:50px;

    text-align:center;

    color:white;

    box-shadow:
        0 30px 80px rgba(0,0,0,0.30),
        inset 0 1px 0 rgba(255,255,255,0.10);

    animation:
        fadeUp .6s ease,
        floatCard 6s ease-in-out infinite;
}

/* =========================
   ICON
========================= */

.success-icon{

    width:110px;
    height:110px;

    margin:0 auto 25px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:48px;

    background:
    linear-gradient(
        135deg,
        #22C55E,
        #4ADE80
    );

    box-shadow:
        0 20px 40px rgba(34,197,94,.30);

    animation:
        pulse 3s infinite;
}

/* =========================
   TITLE
========================= */

.success-card h2{

    color:white;

    font-size:34px;
    font-weight:700;

    margin-bottom:18px;

    letter-spacing:-0.5px;
}

/* =========================
   TEXT
========================= */

.success-card p{

    color:
    rgba(255,255,255,0.82);

    line-height:1.9;

    font-size:16px;

    max-width:450px;
    margin:auto;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pulse{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }
}

@keyframes floatCard{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .success-card{
        padding:35px 25px;
    }

    .success-card h2{
        font-size:28px;
    }

    .success-icon{
        width:90px;
        height:90px;
        font-size:40px;
    }
}

</style>

<div class="success-page">

    <div class="success-card">

        <div class="success-icon">✉️</div>

        <h2>Email Sent Successfully</h2>

        <p>
            We've sent password reset instructions to your email.
            Please check your inbox and spam folder.
        </p>

    </div>

</div>

{% endblock %}
