{% extends 'base.html' %}

{% block content %}

<style>

.complete-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;

    background:
    linear-gradient(
        135deg,
        #0a73db 0%,
        #ecfdf5 50%,
       #117099 100%
    );

    position:relative;
    overflow:hidden;
}

/* Background Glow */

.complete-page::before{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    border-radius:50%;
    background:#22c55e;
    top:-120px;
    right:-100px;
    filter:blur(120px);
    opacity:.08;
}

.complete-page::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    background:#3b82f6;
    bottom:-120px;
    left:-100px;
    filter:blur(120px);
    opacity:.06;
}

/* Card */

.complete-card{

    background:white;

    padding:55px;

    border-radius:32px;

    text-align:center;

    max-width:620px;

    width:100%;

    position:relative;

    z-index:10;

    box-shadow:
    0 20px 60px rgba(0,0,0,.08),
    0 5px 20px rgba(0,0,0,.04);

    animation:fadeUp .6s ease;
}

/* Success Badge */

.complete-icon{

    width:110px;
    height:110px;

    margin:0 auto 25px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:50px;

    border-radius:50%;

    background:
    linear-gradient(
    135deg,
    #16a34a,
    #22c55e
    );

    color:white;

    box-shadow:
    0 15px 40px rgba(34,197,94,.30);

    animation:floatIcon 3s ease-in-out infinite;
}

/* Heading */

.complete-card h2{

    color:#111827;

    font-size:38px;

    font-weight:700;

    margin-bottom:18px;
}

/* Description */

.complete-card p{

    color:#6b7280;

    line-height:1.9;

    font-size:16px;

    max-width:450px;

    margin:0 auto 30px;
}

/* Login Button */

.login-btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    padding:16px 38px;

    border-radius:14px;

    text-decoration:none;

    color:white;

    font-size:16px;

    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #0B6E4F,
    #16A34A
    );

    transition:.3s;

    box-shadow:
    0 10px 30px rgba(22,163,74,.25);
}

.login-btn:hover{

    transform:translateY(-3px);

    box-shadow:
    0 18px 40px rgba(22,163,74,.35);
}

.login-btn:active{

    transform:scale(.98);
}

/* Animations */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes floatIcon{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0);
    }
}

/* Mobile */

@media(max-width:768px){

    .complete-card{

        padding:35px 25px;
    }

    .complete-card h2{

        font-size:30px;
    }

    .complete-icon{

        width:90px;
        height:90px;

        font-size:40px;
    }
}

</style>

<div class="complete-page">

    <div class="complete-card">

        <div class="complete-icon">✅</div>

        <h2>Password Updated Successfully</h2>

        <p>
            Your password has been changed successfully.
            You can now login using your new password.
        </p>

        <a href="{% url 'login' %}" class="login-btn">
            Login Now
        </a>

    </div>

</div>

{% endblock %}
