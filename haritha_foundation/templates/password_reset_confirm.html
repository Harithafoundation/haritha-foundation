{% extends 'base.html' %}

{% block content %}

<style>
.password-page{
    min-height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#14532d,#166534);
}

.password-card{
    width:100%;
    max-width:600px;
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,.2);
}

.password-card h2{
    text-align:center;
    color:#0B6E4F;
    margin-bottom:25px;
}

.password-card label{
    display:block;
    margin-top:15px;
    font-weight:600;
}

.password-card input{
    width:100%;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    margin-top:8px;
    
}

.password-card ul{
    color:#666;
    line-height:1.8;
    font-family: 'Times New Roman', Times, serif;
    font-weight: 600;
    color: black;
}

.password-btn{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#0B6E4F;
    color:white;
    font-size:17px;
    cursor:pointer;
}
</style>

<div class="password-page">

    <div class="password-card">

        <h2>🔒 Create New Password</h2>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="password-btn">
                Change Password
            </button>

        </form>

    </div>

</div>

{% endblock %}
