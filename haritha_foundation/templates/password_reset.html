{% extends 'base.html' %}

{% block content %}

<style>

/* =========================
   PAGE BACKGROUND
========================= */

.reset-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    position:relative;
    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #0F172A 0%,
        #1E293B 35%,
        #334155 100%
    );
}

/* =========================
   FLOATING CARD
========================= */

.reset-card{
    width:100%;
    max-width:560px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,0.15);

    border-radius:28px;

    padding:45px;

    text-align:center;

    color:white;

    box-shadow:
        0 30px 80px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.08);

    animation:
        fadeUp .6s ease,
        floatCard 5s ease-in-out infinite;
}

/* =========================
   ICON
========================= */

.reset-icon{
    width:90px;
    height:90px;

    margin:0 auto 20px;

    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #16A34A,
        #22C55E
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:40px;

    box-shadow:
        0 15px 35px rgba(34,197,94,0.35);

    animation:pulse 3s infinite;
}

/* =========================
   TITLE
========================= */

.reset-card h2{
    font-size:36px;
    font-weight:700;
    margin-bottom:12px;
    letter-spacing:-0.5px;
}

/* =========================
   TEXT
========================= */

.reset-card p{
    line-height:1.8;
    color:rgba(255,255,255,0.78);
    margin-bottom:30px;
    font-size:15px;
}

/* =========================
   INPUT
========================= */

.reset-card input{
    width:100%;
    box-sizing:border-box;

    padding:16px 18px;

    border-radius:14px;

    border:1px solid rgba(255,255,255,0.15);

    background:
    rgba(255,255,255,0.08);

    color:white;

    font-size:15px;

    transition:all .3s ease;
}

.reset-card input::placeholder{
    color:rgba(255,255,255,0.55);
}

.reset-card input:focus{
    outline:none;

    border-color:#22C55E;

    background:
    rgba(255,255,255,0.12);

    box-shadow:
        0 0 0 4px rgba(34,197,94,0.15),
        0 0 25px rgba(34,197,94,0.18);
}

/* =========================
   BUTTON
========================= */

.reset-btn{
    width:100%;
    margin-top:22px;

    padding:16px;

    border:none;
    border-radius:14px;

    background:
    linear-gradient(
        135deg,
        #16A34A,
        #22C55E
    );

    color:white;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:all .3s ease;

    box-shadow:
        0 15px 30px rgba(34,197,94,0.25);
}

.reset-btn:hover{
    transform:
        translateY(-3px);

    box-shadow:
        0 20px 40px rgba(34,197,94,0.35);
}

.reset-btn:active{
    transform:scale(.98);
}

/* =========================
   LINK
========================= */
.register-link{
    margin-top: 20px;
    text-align: center;
    color: #cbd5e1;
}
.register-link a{
    color: #86EFAC;
    text-decoration: none;
    font-weight: 600;
}
.register-link a:hover{
    color: white;
}

.back-link{
    display:inline-block;
    margin-top:22px;

    color:#86EFAC;

    text-decoration:none;

    font-weight:600;

    transition:.3s;
}

.back-link:hover{
    color:white;
}

/* =========================
   ANIMATIONS
========================= */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:
        translateY(30px);
    }

    to{
        opacity:1;
        transform:
        translateY(0);
    }
}

@keyframes pulse{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }
}

@keyframes floatCard{

    0%,100%{
        transform:
        translateY(0);
    }

    50%{
        transform:
        translateY(-8px);
    }
}

/* =========================
   MOBILE
========================= */

@media(max-width:768px){

    .reset-card{
        padding:30px 24px;
    }

    .reset-card h2{
        font-size:28px;
    }

    .reset-icon{
        width:75px;
        height:75px;
        font-size:34px;
    }
}

</style>

<div class="reset-page">
    <div class="reset-card">

        <div class="reset-icon">🔐</div>

        <h2>Forgot Password?</h2>

        <p>
            Don't worry. Enter your registered email address and
            we'll send you a secure password reset link.
        </p>

        <form method="post">
            {% csrf_token %}

            <input
                type="email"
                name="email"
                placeholder="Enter your registered email"
                required
            >

            <button type="submit" class="reset-btn">
                Send Reset Link
            </button>
        </form>
        <p class="register-link">
            Don't have an account?
            <a href="{% url 'register' %}">
                Create Account
            </a>
        </p>
        <a href="{% url 'login' %}" class="back-link">
            ← Back to Login
        </a>

    </div>
</div>

{% endblock %}
